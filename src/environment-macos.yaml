# macOS conda environment - same package set as materials/environment.yaml,
# adapted only where a wheel doesn't exist for macOS. Verified on
# macOS 26 (arm64) with `conda env create -f src/environment-macos.yaml`.
#
# Differences from the professor's Linux environment.yaml, and why:
#   - python bumped 3.10 -> 3.11: drake==1.32.0 has no macOS wheel for
#     cp310 (only cp311/cp312), so 3.10 cannot be satisfied on macOS.
#   - airo-camera-toolkit is DROPPED: it depends on pyrealsense2, which
#     Intel only ships as manylinux/Windows wheels - there is no macOS
#     distribution at all (verified: `pip install pyrealsense2` fails
#     with "no matching distribution"). RealSense frame capture (MVP
#     item 3) will not work on macOS - use the Linux laptop for that.
#   - ompl is DROPPED: not needed for MVP items 1-2 (no motion planning
#     used yet), and the professor's install path is a manylinux-only
#     prebuilt wheel URL.
#
# airo-robots (UR RTDE control) DOES build and import correctly on macOS
# (ur-rtde compiles from source via pip, verified) - so once you're on the
# same network as the UR3, joint/pose control from this Mac should work.
# Only the camera is macOS-blocked.
#
#   conda env create -f src/environment-macos.yaml
#   conda activate irm
name: irm
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11.*
  - scipy
  - matplotlib
  - numpy
  - pip
  - loguru
  - overrides
  - requests
  - jupyter
  - treelib
  - pip:
      - drake==1.32.0
      - "linen @ git+https://github.com/Victorlouisdg/linen@main#subdirectory=linen"
      - airo-typing==2025.4.0
      - airo-spatial-algebra==2025.4.0
      - airo-robots==2025.4.0
      - airo-dataset-tools==2025.4.0
      - airo-drake
      - airo-planner
