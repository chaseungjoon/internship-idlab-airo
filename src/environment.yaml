# Linux conda environment - exact match of materials/environment.yaml (the
# professor's setup). Use this on the lab / robot-connected Linux machine.
# It supports MVP items 1, 2 and 3 (sim, wrist rotation+render, and the real
# UR3 + RealSense camera for frame capture).
#
#   conda env create -f src/environment.yaml
#   conda activate irm
name: irm
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10.*
  - scipy
  - matplotlib
  - numpy
  - pip
  - loguru
  - overrides
  - requests
  - jupyter
  - treelib
  - pip:
      - drake==1.32.0
      - ompl
      - "linen @ git+https://github.com/Victorlouisdg/linen@main#subdirectory=linen"
      - airo-typing==2025.4.0
      - airo-spatial-algebra==2025.4.0
      - airo-robots==2025.4.0
      - airo-camera-toolkit==2025.4.0
      - airo-dataset-tools==2025.4.0
      - airo-drake
      - airo-planner
